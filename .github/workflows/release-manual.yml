name: Release (manual OTP)

on:
  workflow_dispatch:
    inputs:
      otp:
        description: "npm OTP (6-digit code from your authenticator)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish via changesets with OTP
        run: pnpm changeset publish --otp "${{ inputs.otp }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_OTP: ${{ inputs.otp }}

      - name: Push tags
        run: git push --follow-tags
