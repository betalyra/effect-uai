name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1. Node 24 ships
      # npm 11 by default, but pin explicitly so we don't regress if the
      # Node minor changes underneath us.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      # Trusted publishing via OIDC (configured per package on npmjs.com).
      # When changesets are present -> opens/updates the release PR.
      # When merged (no changesets remain) -> runs `pnpm release`, which
      # publishes via OIDC; no NPM_TOKEN, no OTP.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release"
          title: "chore: release"
          # Per-package tag/release creation is off because (a) we ship
          # every package at the same version and want a single
          # `v<version>` tag + one combined GitHub Release, and (b) the
          # action's post-publish step has been known to hang on OIDC
          # publishes. The next step handles tags + release via
          # `scripts/tag-and-release.sh`.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Same script the manual `tag-and-release.yml` workflow uses, so
      # the auto and manual paths produce identical artifacts.
      - name: Create v<version> tag and combined GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/tag-and-release.sh
