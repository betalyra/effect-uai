name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1. Node 24 ships
      # npm 11 by default, but pin explicitly so we don't regress if the
      # Node minor changes underneath us.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      # Trusted publishing via OIDC (configured per package on npmjs.com).
      # When changesets are present -> opens/updates the release PR.
      # When merged (no changesets remain) -> runs `pnpm release`, which
      # publishes via OIDC; no NPM_TOKEN, no OTP.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release"
          title: "chore: release"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
