name: Tag and release

# Manually-triggered cleanup workflow. Walks every package.json under
# `packages/`, computes its `<name>@<version>` tag, and for any tag that
# doesn't already exist on origin: creates an annotated tag pointing at
# the chosen ref, pushes it, and creates a matching GitHub Release whose
# body is the corresponding section of the package's CHANGELOG.md.
#
# Use after a `changesets/action` run that published to npm but failed to
# push tags / create releases. Idempotent — re-running skips any tag that
# already exists on origin.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit-ish to tag (default: main HEAD)"
        required: false
        default: "main"

concurrency:
  group: tag-and-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tags + releases for unreleased package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Refresh remote tag refs so we don't recreate ones that already
          # exist on origin (even if they aren't fetched locally yet).
          git fetch origin --tags --force

          created_any=0

          while IFS= read -r pkg_json; do
            name=$(jq -r .name "$pkg_json")
            version=$(jq -r .version "$pkg_json")
            private=$(jq -r '.private // false' "$pkg_json")

            if [[ "$private" == "true" ]]; then
              echo "skip $name (private)"
              continue
            fi

            tag="${name}@${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "skip $tag (tag exists)"
              continue
            fi

            echo "create $tag"

            git tag -a "$tag" -m "Release $tag"
            git push origin "refs/tags/${tag}"

            # Extract the CHANGELOG section for this version. Stops at the
            # next `## ` heading. Falls back to a one-line note if the
            # section isn't found.
            changelog_file="$(dirname "$pkg_json")/CHANGELOG.md"
            notes_file=$(mktemp)
            if [[ -f "$changelog_file" ]]; then
              awk -v ver="$version" '
                /^## / {
                  if (in_section) exit
                  # Match `## 0.5.0` exactly (ignore trailing junk like dates).
                  if ($2 == ver) { in_section = 1; next }
                }
                in_section { print }
              ' "$changelog_file" > "$notes_file"
            fi

            if [[ ! -s "$notes_file" ]]; then
              echo "Release $tag." > "$notes_file"
            fi

            gh release create "$tag" \
              --title "$tag" \
              --notes-file "$notes_file" \
              --verify-tag

            created_any=1
          done < <(find packages -name package.json -not -path '*/node_modules/*')

          if [[ "$created_any" == "0" ]]; then
            echo "Nothing to do — every package's current version already has a tag on origin."
          fi
