name: Tag and release

# Manual-recovery workflow. The release tag + combined GitHub Release
# are normally created automatically by `release.yml` after a successful
# publish. Use this workflow only when that automated step was skipped,
# failed, or you need to re-run it against a specific ref.
#
# Behavior matches the auto path exactly because both call the same
# `scripts/tag-and-release.sh`. Idempotent: no-op if the tag already
# exists on origin.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit-ish to tag (default: main HEAD)"
        required: false
        default: "main"

concurrency:
  group: tag-and-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create v<version> tag and combined GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/tag-and-release.sh
