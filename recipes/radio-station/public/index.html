<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>effect-uai · radio station</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.25rem;
      }
      h2#station {
        font-size: 1rem;
        font-weight: 500;
        opacity: 0.7;
        margin-top: 0;
        margin-bottom: 1rem;
        min-height: 1.3em;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid currentColor;
        background: transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #status {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        opacity: 0.7;
        margin: 1rem 0;
      }
      #playlist {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0;
      }
      #playlist li {
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        margin: 0.25rem 0;
        display: flex;
        gap: 0.75rem;
        align-items: baseline;
      }
      #playlist li .num {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        opacity: 0.4;
        font-size: 0.85em;
      }
      #playlist li.playing {
        background: color-mix(in srgb, currentColor 10%, transparent);
        font-weight: 600;
      }
      #playlist li.playing .num::before {
        content: "▶ ";
      }
      #cycle {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85em;
        opacity: 0.5;
        margin-left: 0.5rem;
      }
      .err {
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <h1>radio station · effect-uai</h1>
    <h2 id="station">click start to plan a station</h2>
    <p>
      <button id="toggle">Start</button>
      <span id="status">idle</span>
      <span id="cycle"></span>
    </p>
    <ol id="playlist"></ol>
    <p style="opacity: 0.55; font-size: 0.85em">
      An LLM plans a 10-track station from a brief, ElevenLabs Music generates each track, and the
      server pipelines one prefetch ahead of playback. Cycle 2 replays the same set from the
      on-disk cache for free.
    </p>
    <script type="module" src="/client.js"></script>
  </body>
</html>
