<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>effect-uai · streaming synthesis</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        border: 1px solid currentColor;
        font: inherit;
        background: transparent;
      }
      #status {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        opacity: 0.7;
        margin: 1rem 0;
      }
      #history {
        margin-top: 1rem;
        white-space: pre-wrap;
      }
      #history .entry {
        margin-bottom: 0.3rem;
      }
      .err {
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <h1>streaming synthesis · effect-uai</h1>
    <p>
      Type a line and hit <strong>Enter</strong>. Words flow into the ElevenLabs
      <code>/stream-input</code> WebSocket on the server; PCM chunks come back and play through a
      ring-buffered <code>AudioWorklet</code>. Keep typing to feed more text into the same session.
    </p>
    <input id="text" type="text" placeholder="Type something, hit Enter to speak…" autofocus />
    <p id="status">idle</p>
    <div id="history"></div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
