<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>effect-uai · streaming transcription</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        line-height: 1.5;
      }
      h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: 1px solid currentColor;
        background: transparent;
        cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      #status { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; opacity: 0.7; margin: 1rem 0; }
      #transcript { white-space: pre-wrap; }
      .partial { opacity: 0.5; }
      .final { font-weight: 500; }
      .err { color: #c0392b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </head>
  <body>
    <h1>streaming transcription · effect-uai</h1>
    <p>
      Click <strong>Start</strong>, allow microphone access, and watch the live transcript
      appear as you speak. Partial hypotheses are dimmed; finalized segments are bold.
    </p>
    <p>
      <button id="toggle">Start</button>
      <span id="status">idle</span>
    </p>
    <div id="transcript"></div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
